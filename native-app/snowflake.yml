# =============================================================================
# Snowflake CLI native-app project definition (replaces the hand-rolled setup.ps1
# orchestration for the provider side; see PLAN-native-app-packaging.md §8).
#
# Deploy:  snow app run            (builds package + installs app in one account)
# Version: snow app version create
#
# The image repository is a SIBLING entity, NOT a child of the application package
# (verified against the Snowflake CLI native-app docs). Images are built + pushed
# by scripts/build-and-push.ps1 BEFORE `snow app run`, because the version freezes
# the referenced images at definition time.
#
# Provider-specific identifiers (db/schema/role) are intentionally NOT hardcoded
# here — they are read from native-app-config.json (gitignored) by the build
# script, to keep the personal dev DB name out of git (see memory
# feedback-no-personal-db-name-in-git).
# =============================================================================

definition_version: 2

entities:
  pkg:
    type: application package
    identifier: MENDIX_SPCS_PKG
    manifest: app/manifest.yml
    artifacts:
      - src: app/*
        dest: ./

  app:
    type: application
    identifier: MENDIX_SPCS_APP
    from:
      target: pkg
    # debug: true exposes app-owned objects to the provider role during dev so we
    # can inspect the controller/admin-ui services and the registry tables.
    debug: true

  # Standalone image repository the manifest + service specs reference by FQN.
  # `snow spcs image-repository deploy images` creates it.
  images:
    type: image-repository
    identifier: MENDIX_NATIVE_REPO
